# Manual trigger for (re)training + registering a Model Version — for the
# initial model or a deliberate full retrain. The automated drift-triggered
# retraining loop (FR-14) runs on the EC2 box on-demand, not here (brief/PRD
# architecture decision: retraining compute stays off GitHub Actions).
#
# Downloads the real "data/ieee_cis_sample.csv" (Kaggle IEEE-CIS) dataset
# if the KAGGLE_API_TOKEN repo secret is set, or falls back to the
# synthetic stand-in (see model/data.py) — fine for exercising the
# pipeline, not for a real model. See data/README.md for what the secret
# needs and why a Kaggle competition dataset needs more than just a token.
name: train-and-register

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Download real IEEE-CIS sample (optional)
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          if [ -z "$KAGGLE_API_TOKEN" ]; then
            echo "KAGGLE_API_TOKEN not set — training on synthetic stand-in data (see data/README.md)."
          else
            python -m mlops.download_ieee_cis
          fi

      - name: Train, validate, package, register
        run: python -m model.pipeline

      - name: Commit updated model + pointer
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add production_pointer.json models/production models/registration_log.jsonl models/validation_log.jsonl
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "Register new model version via train-and-register workflow"
            git push
          fi
