# FR-10: Infrastructure Monitoring. Node/pod CPU+RAM comes from the
# kubelet's built-in cAdvisor endpoint (no extra exporter pod needed — the
# 1GB box can't spare one). Standard kube-prometheus-style scrape config:
# Kubernetes service discovery (role: node) + the API server's node proxy.
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: fraud-platform
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: inference-api
        static_configs:
          - targets: ["inference-api:8000"]

      - job_name: kubernetes-cadvisor
        scrape_interval: 60s
        scrape_timeout: 30s
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor
