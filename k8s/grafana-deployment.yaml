# Provisioning ConfigMaps (grafana-datasources, grafana-dashboard-provisioning,
# grafana-dashboards) are created by k8s/deploy.sh from monitoring/grafana/ —
# not hand-duplicated here, so the dashboard JSON has one source of truth.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: fraud-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.3.0
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "changeme" # change this — see README
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 30m
              memory: 100Mi
            limits:
              cpu: 150m
              memory: 180Mi
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provisioning
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provisioning
          configMap:
            name: grafana-dashboard-provisioning
        - name: dashboards
          configMap:
            name: grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: fraud-platform
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30030
